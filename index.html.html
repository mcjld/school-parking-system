<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Parking Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            padding: 40px;
        }

        .form-section, .status-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #4facfe;
        }

        button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .status {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .available { background: #d4edda; color: #155724; }
        .full { background: #f8d7da; color: #721c24; }
        .registered { background: #d1ecf1; color: #0c5460; }

        .parking-slots {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .slot {
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .slot.available {
            background: #d4edda;
            color: #155724;
            cursor: pointer;
        }

        .slot.occupied {
            background: #f8d7da;
            color: #721c24;
        }

        .slot:hover {
            transform: scale(1.05);
        }

        .registered-cars {
            margin-top: 20px;
        }

        .car-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #4facfe;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .remove-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .content {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 School Parking System</h1>
            <p>Total Parking Slots: <span id="totalSlots">50</span></p>
        </div>
        
        <div class="content">
            <!-- Registration Form -->
            <div class="form-section">
                <h2>📝 Register Your Vehicle</h2>
                <div class="form-group">
                    <label>Student ID:</label>
                    <input type="text" id="studentId" placeholder="e.g., STU2024001" maxlength="20">
                </div>
                <div class="form-group">
                    <label>License Plate:</label>
                    <input type="text" id="plateNumber" placeholder="e.g., ABC-1234" maxlength="10">
                </div>
                <button onclick="registerVehicle()">Register Vehicle</button>
            </div>

            <!-- Status Display -->
            <div class="status-section">
                <div id="parkingStatus" class="status">Check parking availability</div>
            </div>

            <!-- Parking Slots Visualization -->
            <div class="form-section">
                <h2>🅿️ Parking Slots Overview</h2>
                <div id="parkingSlots" class="parking-slots"></div>
            </div>

            <!-- Registered Cars -->
            <div class="form-section">
                <h2>✅ Registered Vehicles</h2>
                <div id="registeredCars" class="registered-cars"></div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const TOTAL_SLOTS = 50;
        let parkingData = JSON.parse(localStorage.getItem('schoolParkingData')) || {
            registeredVehicles: [],
            occupiedSlots: 0
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            updateParkingStatus();
            renderParkingSlots();
            renderRegisteredCars();
        });

        function registerVehicle() {
            const studentId = document.getElementById('studentId').value.trim().toUpperCase();
            const plateNumber = document.getElementById('plateNumber').value.trim().toUpperCase();

            // Validation
            if (!studentId || !plateNumber) {
                alert('Please fill in both Student ID and License Plate');
                return;
            }

            // Check if already registered
            if (isAlreadyRegistered(studentId, plateNumber)) {
                alert('This vehicle or student ID is already registered!');
                return;
            }

            // Check if parking is full
            if (parkingData.occupiedSlots >= TOTAL_SLOTS) {
                alert('Sorry! All parking slots are full.');
                return;
            }

            // Register vehicle
            parkingData.registeredVehicles.push({
                studentId,
                plateNumber,
                registrationTime: new Date().toLocaleString()
            });
            parkingData.occupiedSlots++;

            // Save to localStorage
            localStorage.setItem('schoolParkingData', JSON.stringify(parkingData));

            // Update UI
            updateParkingStatus();
            renderParkingSlots();
            renderRegisteredCars();

            // Clear form
            document.getElementById('studentId').value = '';
            document.getElementById('plateNumber').value = '';

            alert('✅ Vehicle registered successfully! Parking slot assigned.');
        }

        function isAlreadyRegistered(studentId, plateNumber) {
            return parkingData.registeredVehicles.some(vehicle => 
                vehicle.studentId === studentId || vehicle.plateNumber === plateNumber
            );
        }

        function updateParkingStatus() {
            const statusEl = document.getElementById('parkingStatus');
            const availableSlots = TOTAL_SLOTS - parkingData.occupiedSlots;
            const statusClass = availableSlots > 0 ? 'available' : 'full';
            
            statusEl.textContent = availableSlots > 0 
                ? `✅ ${availableSlots} parking slots available!`
                : '❌ Parking lot is FULL!';
            statusEl.className = `status ${statusClass}`;
        }

        function renderParkingSlots() {
            const container = document.getElementById('parkingSlots');
            const availableSlots = TOTAL_SLOTS - parkingData.occupiedSlots;
            
            container.innerHTML = '';
            
            // Show first 20 slots for visualization
            for (let i = 0; i < Math.min(20, TOTAL_SLOTS); i++) {
                const slotEl = document.createElement('div');
                slotEl.className = `slot ${i < availableSlots ? 'available' : 'occupied'}`;
                slotEl.textContent = i < availableSlots ? `Slot ${i + 1} ✅` : `Slot ${i + 1} ❌`;
                container.appendChild(slotEl);
            }
        }

        function renderRegisteredCars() {
            const container = document.getElementById('registeredCars');
            
            if (parkingData.registeredVehicles.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666;">No vehicles registered yet</p>';
                return;
            }

            container.innerHTML = parkingData.registeredVehicles.map((vehicle, index) => `
                <div class="car-item">
                    <div>
                        <strong>ID:</strong> ${vehicle.studentId}<br>
                        <strong>Plate:</strong> ${vehicle.plateNumber}<br>
                        <small>Registered: ${vehicle.registrationTime}</small>
                    </div>
                    <button class="remove-btn" onclick="removeVehicle(${index})">Remove</button>
                </div>
            `).join('');
        }

        function removeVehicle(index) {
            if (confirm('Remove this vehicle registration?')) {
                parkingData.registeredVehicles.splice(index, 1);
                parkingData.occupiedSlots = Math.max(0, parkingData.occupiedSlots - 1);
                localStorage.setItem('schoolParkingData', JSON.stringify(parkingData));
                
                updateParkingStatus();
                renderParkingSlots();
                renderRegisteredCars();
            }
        }

        // Allow Enter key to submit form
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                registerVehicle();
            }
        });

        // Reset data button (for demo purposes)
        const resetBtn = document.createElement('button');
        resetBtn.textContent = 'Reset All Data';
        resetBtn.style.cssText = 'background: #dc3545; margin: 20px 40px; padding: 10px 20px; border-radius: 10px; color: white; border: none; cursor: pointer;';
        resetBtn.onclick = function() {
            if (confirm('Reset all parking data? This cannot be undone!')) {
                localStorage.removeItem('schoolParkingData');
                parkingData = { registeredVehicles: [], occupiedSlots: 0 };
                updateParkingStatus();
                renderParkingSlots();
                renderRegisteredCars();
            }
        };
        document.querySelector('.content').appendChild(resetBtn);
    </script>
</body>
</html>
